name: Valid
description: Valid action that is included in other places
inputs:
  required-input-1:
    description: Input that is required
    required: true
  optional-input-1:
    description: Input that is optional
    default: ""
outputs:
  output-1:
    description: Sample output
    value: "output1"
  output-2:
    description: Sample output
    value: "output2"
runs:
  steps:
    - name: Simple echo steps
      shell: bash
      id: step-1
      env:
        VARIABLE_1: value
        VARIABLE_2: value
      run: |
        echo 'A sample message, with env var: ${{ env.VARIABLE_1 }}'
        echo '${{ env.VARIABLE_2 }}'
        if [[ '${{ var.FEATURE1_ENABLED }}' == 'true' ]]; then
          echo "Feature1 is enabled"
        fi
        if [[ '${{ secrets.TOKEN1 }}' != '' ]]; then
          echo "Token1 is not empty"
        fi

        echo "output-1=aaa" >> $GITHUB_OUTPUT

    - uses: ./.github/actions/required-action
      id: step-2
      with:
        required-input-1: aaa

    - uses: actions/checkout@v4
      id: step-3

    - name: Calls to existing outputs
      shell: bash
      run: |
        echo '${{ steps.step-1.outputs.output-1 }}'
        echo '${{ steps.step-2.outputs.output-1 }}'
        echo '${{ steps.step-3.outputs.ref }}'
    
    - name: Call to existing input
      run: |
        echo '${{ inputs.required-input-1 }}'

    - name: Override external action with local source
      uses: fake-username/fake-external-action@v1
      id: fake-external-action
      with:
        input-1: "value"

    - name: Use output from external action
      shell: bash
      run: |
        echo '${{ steps.fake-external-action.outputs.output-1 }}'
        echo '${{ steps.fake-external-action.outputs.dynamic-output-123 }}'

    - name: Call ECR login
      uses: aws-actions/amazon-ecr-login@v2
      id: ecr-login
      with:
        registries: 123456789012345678

    - name: Use output from ECR login
      shell: bash
      run: |
        echo '${{ steps.ecr-login.outputs.docker_username_123456789012345678_dkr_ecr_eu_west_1_amazonaws_com }}'
